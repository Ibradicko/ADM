<section class="adm-page">
  <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm" class="adm-card adm-card--spaced adm-form-surface">
    <div class="adm-section-heading">
      <div>
        <h2
          id="jhi-authority-heading"
          data-cy="AuthorityCreateUpdateHeading"
          jhiTranslate="admSupervisionVentesApp.adminAuthority.home.createOrEditLabel"
        >
          Create or edit a Authority
        </h2>
      </div>
    </div>

    <jhi-alert-error />

    <div class="adm-form-grid">
      @let nameRef = editForm.get('name')!;
      <label class="adm-field">
        <span jhiTranslate="admSupervisionVentesApp.adminAuthority.name">Name</span>
        <input type="text" name="name" id="field_name" data-cy="name" formControlName="name" [readonly]="editForm.get('name')!.disabled" />
        @if (nameRef.invalid && (nameRef.dirty || nameRef.touched)) {
          @if (nameRef.errors?.required) {
            <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
          }
          @if (nameRef.errors?.maxlength) {
            <small class="text-danger" jhiTranslate="entity.validation.maxlength" [translateValues]="{ max: '50' }"
              >This field cannot be longer than 50 characters.</small
            >
          }
        }
      </label>
    </div>

    <div class="adm-page__actions">
      <button
        type="button"
        id="cancel-save"
        data-cy="entityCreateCancelButton"
        class="adm-button adm-button--ghost"
        (click)="previousState()"
      >
        <fa-icon icon="ban" /> <span jhiTranslate="entity.action.cancel">Cancel</span>
      </button>
      <button
        type="submit"
        id="save-entity"
        data-cy="entityCreateSaveButton"
        [disabled]="editForm.invalid || isSaving()"
        class="adm-button adm-button--primary"
      >
        <fa-icon icon="save" /> <span jhiTranslate="entity.action.save">Save</span>
      </button>
    </div>
  </form>
</section>
