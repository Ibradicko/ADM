<section class="adm-page">
  <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm" class="adm-card adm-card--spaced adm-form-surface">
    <div class="adm-section-heading">
      <div>
        <h2 id="myUserLabel" data-cy="UserManagementCreateUpdateHeading" jhiTranslate="userManagement.home.createOrEditLabel">
          Create or edit a user
        </h2>
      </div>
    </div>

    <jhi-alert-error />

    <div class="adm-form-grid">
      @if (editForm.value.id) {
        <label class="adm-field">
          <span jhiTranslate="global.field.id">ID</span>
          <input type="text" id="field_id" name="id" formControlName="id" readonly />
        </label>
      }

      @let loginRef = editForm.get('login')!;
      <label class="adm-field">
        <span jhiTranslate="userManagement.login">Login</span>
        <input type="text" id="field_login" name="login" formControlName="login" data-cy="login" />
        @if (loginRef.invalid && (loginRef.dirty || loginRef.touched)) {
          @if (loginRef.errors?.required) {
            <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
          }
          @if (loginRef.errors?.maxlength) {
            <small class="text-danger" jhiTranslate="entity.validation.maxlength" [translateValues]="{ max: '50' }"
              >This field cannot be longer than 50 characters.</small
            >
          }
          @if (loginRef.errors?.pattern) {
            <small class="text-danger" jhiTranslate="entity.validation.patternLogin"
              >This field can only contain letters, digits and e-mail addresses.</small
            >
          }
        }
      </label>

      @let firstNameRef = editForm.get('firstName')!;
      <label class="adm-field">
        <span jhiTranslate="userManagement.firstName">First name</span>
        <input type="text" id="field_firstName" name="firstName" formControlName="firstName" data-cy="firstName" />
        @if (firstNameRef.invalid && (firstNameRef.dirty || firstNameRef.touched) && firstNameRef.errors?.maxlength) {
          <small class="text-danger" jhiTranslate="entity.validation.maxlength" [translateValues]="{ max: '50' }"
            >This field cannot be longer than 50 characters.</small
          >
        }
      </label>

      @let lastNameRef = editForm.get('lastName')!;
      <label class="adm-field">
        <span jhiTranslate="userManagement.lastName">Last name</span>
        <input type="text" id="field_lastName" name="lastName" formControlName="lastName" data-cy="lastName" />
        @if (lastNameRef.invalid && (lastNameRef.dirty || lastNameRef.touched) && lastNameRef.errors?.maxlength) {
          <small class="text-danger" jhiTranslate="entity.validation.maxlength" [translateValues]="{ max: '50' }"
            >This field cannot be longer than 50 characters.</small
          >
        }
      </label>

      @let emailRef = editForm.get('email')!;
      <label class="adm-field">
        <span jhiTranslate="userManagement.email">Email</span>
        <input type="email" id="field_email" name="email" formControlName="email" data-cy="email" />
        @if (emailRef.invalid && (emailRef.dirty || emailRef.touched)) {
          @if (emailRef.errors?.required) {
            <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
          }
          @if (emailRef.errors?.maxlength) {
            <small class="text-danger" jhiTranslate="entity.validation.maxlength" [translateValues]="{ max: '100' }"
              >This field cannot be longer than 100 characters.</small
            >
          }
          @if (emailRef.errors?.minlength) {
            <small class="text-danger" jhiTranslate="entity.validation.minlength" [translateValues]="{ min: '5' }"
              >This field is required to be at least 5 characters.</small
            >
          }
          @if (emailRef.errors?.email) {
            <small class="text-danger" jhiTranslate="global.messages.validate.email.invalid">Your email is invalid.</small>
          }
        }
      </label>

      <label class="adm-field adm-field--checkbox">
        <input
          type="checkbox"
          [attr.disabled]="editForm.value.id === undefined ? 'disabled' : null"
          id="activated"
          name="activated"
          formControlName="activated"
          data-cy="activated"
        />
        <span jhiTranslate="userManagement.activated">Activated</span>
      </label>

      @if (languages && languages.length > 0) {
        <label class="adm-field">
          <span jhiTranslate="userManagement.langKey">Language</span>
          <select id="langKey" name="langKey" formControlName="langKey" data-cy="langKey">
            @for (language of languages; track $index) {
              <option [value]="language">{{ language | findLanguageFromKey }}</option>
            }
          </select>
        </label>
      }

      <label class="adm-field adm-field--full">
        <span jhiTranslate="userManagement.profiles">Profiles</span>
        <select id="field_authority" multiple name="authority" formControlName="authorities">
          @for (authority of authorities(); track $index) {
            <option [value]="authority">{{ authority }}</option>
          }
        </select>
      </label>
    </div>

    <div class="adm-page__actions">
      <button type="button" class="adm-button adm-button--ghost" (click)="previousState()" data-cy="entityCreateCancelButton">
        <fa-icon icon="ban" /> <span jhiTranslate="entity.action.cancel">Cancel</span>
      </button>
      <button
        type="submit"
        [disabled]="editForm.invalid || isSaving()"
        class="adm-button adm-button--primary"
        data-cy="entityCreateSaveButton"
      >
        <fa-icon icon="save" /> <span jhiTranslate="entity.action.save">Save</span>
      </button>
    </div>
  </form>
</section>
