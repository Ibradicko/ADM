<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (depotStock(); as depotStockRef) {
      <div>
        <h2 data-cy="depotStockDetailsHeading"><span jhiTranslate="admSupervisionVentesApp.depotStock.detail.title">Depot Stock</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ depotStockRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.depotStock.code">Code</span></dt>
          <dd>
            <span>{{ depotStockRef.code }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.depotStock.libelle">Libelle</span></dt>
          <dd>
            <span>{{ depotStockRef.libelle }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.depotStock.emplacement">Emplacement</span></dt>
          <dd>
            <span>{{ depotStockRef.emplacement }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.depotStock.actif">Actif</span></dt>
          <dd>
            <span>{{ depotStockRef.actif }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.depotStock.boutique">Boutique</span></dt>
          <dd>
            @if (depotStock()!.boutique) {
              <div>
                <a [routerLink]="['/boutique', depotStock()!.boutique?.id, 'view']">{{ depotStockRef.boutique?.nom }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/depot-stock', depotStockRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
