@if (modePaiementRef(); as modePaiementRefRef) {
  <section class="adm-page">
    <header class="adm-page__header">
      <div>
        <p class="adm-page__eyebrow" jhiTranslate="admSupervisionVentesApp.modePaiementRef.detail.title">Mode Paiement Ref</p>
        <h1 data-cy="modePaiementRefDetailsHeading">{{ modePaiementRefRef.libelle }}</h1>
        <p>{{ modePaiementRefRef.code || '--' }}</p>
      </div>
      <div class="adm-page__actions">
        <button type="button" (click)="previousState()" class="adm-button adm-button--ghost" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" /> <span jhiTranslate="entity.action.back">Back</span>
        </button>
        <a [routerLink]="['/mode-paiement-ref', modePaiementRefRef.id, 'edit']" class="adm-button">
          <fa-icon icon="pencil-alt" /> <span jhiTranslate="entity.action.edit">Edit</span>
        </a>
      </div>
    </header>

    <jhi-alert-error />
    <jhi-alert />

    <article class="adm-card adm-card--spaced">
      <div class="adm-section-heading">
        <div>
          <h2 jhiTranslate="admSupervisionVentesApp.modePaiementRef.detail.title">Mode Paiement Ref</h2>
        </div>
        <span class="adm-pill" [class.adm-pill--success]="modePaiementRefRef.actif" [class.adm-pill--warning]="!modePaiementRefRef.actif">
          {{ modePaiementRefRef.actif ? 'Actif' : 'Inactif' }}
        </span>
      </div>

      <div class="adm-detail-grid">
        <div class="adm-detail-block">
          <span class="adm-detail-block__label" jhiTranslate="admSupervisionVentesApp.modePaiementRef.code">Code</span>
          <strong>{{ modePaiementRefRef.code }}</strong>
        </div>
        <div class="adm-detail-block">
          <span class="adm-detail-block__label" jhiTranslate="admSupervisionVentesApp.modePaiementRef.libelle">Libelle</span>
          <strong>{{ modePaiementRefRef.libelle }}</strong>
        </div>
      </div>
    </article>
  </section>
