<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (parametreGlobal(); as parametreGlobalRef) {
      <div>
        <h2 data-cy="parametreGlobalDetailsHeading">
          <span jhiTranslate="admSupervisionVentesApp.parametreGlobal.detail.title">Parametre Global</span>
        </h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ parametreGlobalRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.parametreGlobal.code">Code</span></dt>
          <dd>
            <span>{{ parametreGlobalRef.code }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.parametreGlobal.valeur">Valeur</span></dt>
          <dd>
            <span>{{ parametreGlobalRef.valeur }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.parametreGlobal.description">Description</span></dt>
          <dd>
            <span>{{ parametreGlobalRef.description }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.parametreGlobal.actif">Actif</span></dt>
          <dd>
            <span>{{ parametreGlobalRef.actif }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/parametre-global', parametreGlobalRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
