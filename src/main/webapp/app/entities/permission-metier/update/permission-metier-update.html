<section class="adm-page">
  <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm" class="adm-card adm-card--spaced adm-form-surface">
    <div class="adm-section-heading">
      <div>
        <h2
          id="jhi-permission-metier-heading"
          data-cy="PermissionMetierCreateUpdateHeading"
          jhiTranslate="admSupervisionVentesApp.permissionMetier.home.createOrEditLabel"
        >
          Create or edit a Permission Metier
        </h2>
      </div>
    </div>

    <jhi-alert-error />

    <div class="adm-form-grid">
      @if (editForm.controls.id.value !== null) {
        <label class="adm-field">
          <span jhiTranslate="global.field.id">ID</span>
          <input type="number" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </label>
      }

      @let codeRef = editForm.get('code')!;
      <label class="adm-field">
        <span jhiTranslate="admSupervisionVentesApp.permissionMetier.code">Code</span>
        <input type="text" name="code" id="field_code" data-cy="code" formControlName="code" />
        @if (codeRef.invalid && (codeRef.dirty || codeRef.touched)) {
          @if (codeRef.errors?.required) {
            <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
          }
          @if (codeRef.errors?.maxlength) {
            <small class="text-danger" jhiTranslate="entity.validation.maxlength" [translateValues]="{ max: '80' }"
              >This field cannot be longer than 80 characters.</small
            >
          }
        }
      </label>

      @let libelleRef = editForm.get('libelle')!;
      <label class="adm-field">
        <span jhiTranslate="admSupervisionVentesApp.permissionMetier.libelle">Libelle</span>
        <input type="text" name="libelle" id="field_libelle" data-cy="libelle" formControlName="libelle" />
        @if (libelleRef.invalid && (libelleRef.dirty || libelleRef.touched)) {
          @if (libelleRef.errors?.required) {
            <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
          }
          @if (libelleRef.errors?.maxlength) {
            <small class="text-danger" jhiTranslate="entity.validation.maxlength" [translateValues]="{ max: '150' }"
              >This field cannot be longer than 150 characters.</small
            >
          }
        }
      </label>

      @let moduleRef = editForm.get('module')!;
      <label class="adm-field">
        <span jhiTranslate="admSupervisionVentesApp.permissionMetier.module">Module</span>
        <input type="text" name="module" id="field_module" data-cy="module" formControlName="module" />
        @if (moduleRef.invalid && (moduleRef.dirty || moduleRef.touched)) {
          @if (moduleRef.errors?.required) {
            <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
          }
          @if (moduleRef.errors?.maxlength) {
            <small class="text-danger" jhiTranslate="entity.validation.maxlength" [translateValues]="{ max: '80' }"
              >This field cannot be longer than 80 characters.</small
            >
          }
        }
      </label>

      <label class="adm-field adm-field--full">
        <span jhiTranslate="admSupervisionVentesApp.permissionMetier.description">Description</span>
        <textarea name="description" id="field_description" data-cy="description" formControlName="description"></textarea>
      </label>

      <label class="adm-field adm-field--full">
        <span jhiTranslate="admSupervisionVentesApp.permissionMetier.profils">Profils</span>
        <select
          id="field_profilses"
          data-cy="profils"
          multiple
          name="profilses"
          formControlName="profilses"
          [compareWith]="compareProfilMetier"
        >
          @for (profilMetierOption of profilMetiersSharedCollection(); track $index) {
            <option [ngValue]="profilMetierOption">{{ profilMetierOption.code }}</option>
          }
        </select>
      </label>
    </div>

    <div class="adm-page__actions">
      <button
        type="button"
        id="cancel-save"
        data-cy="entityCreateCancelButton"
        class="adm-button adm-button--ghost"
        (click)="previousState()"
      >
        <fa-icon icon="ban" /> <span jhiTranslate="entity.action.cancel">Cancel</span>
      </button>
      <button
        type="submit"
        id="save-entity"
        data-cy="entityCreateSaveButton"
        [disabled]="editForm.invalid || isSaving()"
        class="adm-button adm-button--primary"
      >
        <fa-icon icon="save" /> <span jhiTranslate="entity.action.save">Save</span>
      </button>
    </div>
  </form>
</section>
