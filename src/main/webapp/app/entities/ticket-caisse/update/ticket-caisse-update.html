<section class="adm-page">
  <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm" class="adm-card adm-card--spaced adm-form-surface">
    <div class="adm-section-heading">
      <div>
        <h2
          id="jhi-ticket-caisse-heading"
          data-cy="TicketCaisseCreateUpdateHeading"
          jhiTranslate="admSupervisionVentesApp.ticketCaisse.home.createOrEditLabel"
        >
          Create or edit a Ticket Caisse
        </h2>
      </div>
    </div>

    <jhi-alert-error />

    <div class="adm-form-grid">
      @if (editForm.controls.id.value !== null) {
        <label class="adm-field">
          <span jhiTranslate="global.field.id">ID</span>
          <input type="number" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </label>
      }

      @let numeroRef = editForm.get('numero')!;
      <label class="adm-field">
        <span jhiTranslate="admSupervisionVentesApp.ticketCaisse.numero">Numero</span>
        <input type="text" name="numero" id="field_numero" data-cy="numero" formControlName="numero" />
        @if (numeroRef.invalid && (numeroRef.dirty || numeroRef.touched)) {
          @if (numeroRef.errors?.required) {
            <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
          }
          @if (numeroRef.errors?.maxlength) {
            <small class="text-danger" jhiTranslate="entity.validation.maxlength" [translateValues]="{ max: '80' }"
              >This field cannot be longer than 80 characters.</small
            >
          }
        }
      </label>

      @let dateEmissionRef = editForm.get('dateEmission')!;
      <label class="adm-field">
        <span jhiTranslate="admSupervisionVentesApp.ticketCaisse.dateEmission">Date Emission</span>
        <input
          id="field_dateEmission"
          data-cy="dateEmission"
          type="datetime-local"
          name="dateEmission"
          formControlName="dateEmission"
          placeholder="YYYY-MM-DD HH:mm"
        />
        @if (dateEmissionRef.invalid && (dateEmissionRef.dirty || dateEmissionRef.touched)) {
          @if (dateEmissionRef.errors?.required) {
            <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
          }
          <small class="text-danger" [hidden]="!dateEmissionRef.errors?.datetimelocal" jhiTranslate="entity.validation.datetimelocal"
            >This field should be a date and time.</small
          >
        }
      </label>

      @let nombreImpressionsRef = editForm.get('nombreImpressions')!;
      <label class="adm-field">
        <span jhiTranslate="admSupervisionVentesApp.ticketCaisse.nombreImpressions">Nombre Impressions</span>
        <input
          type="number"
          name="nombreImpressions"
          id="field_nombreImpressions"
          data-cy="nombreImpressions"
          formControlName="nombreImpressions"
        />
        @if (nombreImpressionsRef.invalid && (nombreImpressionsRef.dirty || nombreImpressionsRef.touched)) {
          @if (nombreImpressionsRef.errors?.required) {
            <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
          }
          @if (nombreImpressionsRef.errors?.min) {
            <small class="text-danger" jhiTranslate="entity.validation.min" [translateValues]="{ min: '1' }"
              >This field should be at least 1.</small
            >
          }
          <small class="text-danger" [hidden]="!nombreImpressionsRef.errors?.number" jhiTranslate="entity.validation.number"
            >This field should be a number.</small
          >
        }
      </label>

      <label class="adm-field adm-field--full">
        <span jhiTranslate="admSupervisionVentesApp.ticketCaisse.contenu">Contenu</span>
        <textarea name="contenu" id="field_contenu" data-cy="contenu" formControlName="contenu"></textarea>
      </label>

      @let venteRef = editForm.get('vente')!;
      <label class="adm-field">
        <span jhiTranslate="admSupervisionVentesApp.ticketCaisse.vente">Vente</span>
        <select id="field_vente" data-cy="vente" name="vente" formControlName="vente" [compareWith]="compareVente">
          @if (!editForm.get('vente')!.value) {
            <option [ngValue]="null" selected></option>
          }
          @for (venteOption of ventesSharedCollection(); track $index) {
            <option [ngValue]="venteOption">{{ venteOption.numeroTicket }}</option>
          }
        </select>
        @if (venteRef.invalid && (venteRef.dirty || venteRef.touched) && venteRef.errors?.required) {
          <small class="text-danger" jhiTranslate="entity.validation.required">This field is required.</small>
        }
      </label>
    </div>

    <div class="adm-page__actions">
      <button
        type="button"
        id="cancel-save"
        data-cy="entityCreateCancelButton"
        class="adm-button adm-button--ghost"
        (click)="previousState()"
      >
        <fa-icon icon="ban" /> <span jhiTranslate="entity.action.cancel">Cancel</span>
      </button>
      <button
        type="submit"
        id="save-entity"
        data-cy="entityCreateSaveButton"
        [disabled]="editForm.invalid || isSaving()"
        class="adm-button adm-button--primary"
      >
        <fa-icon icon="save" /> <span jhiTranslate="entity.action.save">Save</span>
      </button>
    </div>
  </form>
</section>
