<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (uniteMesure(); as uniteMesureRef) {
      <div>
        <h2 data-cy="uniteMesureDetailsHeading">
          <span jhiTranslate="admSupervisionVentesApp.uniteMesure.detail.title">Unite Mesure</span>
        </h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ uniteMesureRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.uniteMesure.code">Code</span></dt>
          <dd>
            <span>{{ uniteMesureRef.code }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.uniteMesure.libelle">Libelle</span></dt>
          <dd>
            <span>{{ uniteMesureRef.libelle }}</span>
          </dd>
          <dt><span jhiTranslate="admSupervisionVentesApp.uniteMesure.symbole">Symbole</span></dt>
          <dd>
            <span>{{ uniteMesureRef.symbole }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/unite-mesure', uniteMesureRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
