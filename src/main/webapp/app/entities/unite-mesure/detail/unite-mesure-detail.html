@if (uniteMesure(); as uniteMesureRef) {

    <header class="adm-page__header">
      <div>
        <p class="adm-page__eyebrow" jhiTranslate="admSupervisionVentesApp.uniteMesure.detail.title">Unite Mesure</p>
        <h1 data-cy="uniteMesureDetailsHeading">{{ uniteMesureRef.libelle }}</h1>
        <p>{{ uniteMesureRef.code || '--' }}</p>

      <div class="adm-page__actions">
        <button type="button" (click)="previousState()" class="adm-button adm-button--ghost" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" /> <span jhiTranslate="entity.action.back">Back</span>

      <div class="adm-detail-grid">

        </div>
        <div class="adm-detail-block">
          <span class="adm-detail-block__label" jhiTranslate="admSupervisionVentesApp.uniteMesure.code">Code</span>
          <strong>{{ uniteMesureRef.code }}</strong>
        </div>
        <div class="adm-detail-block">
          <span class="adm-detail-block__label" jhiTranslate="admSupervisionVentesApp.uniteMesure.libelle">Libelle</span>
          <strong>{{ uniteMesureRef.libelle }}</strong>
        </div>
        <div class="adm-detail-block">
          <span class="adm-detail-block__label" jhiTranslate="admSupervisionVentesApp.uniteMesure.symbole">Symbole</span>
