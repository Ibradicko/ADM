<div class="adm-shell-layer">
  <aside class="adm-sidebar" [class.adm-sidebar--open]="!isNavbarCollapsed()">
    <div class="adm-sidebar__brand">
      <a class="adm-brand" routerLink="/dashboard" (click)="collapseNavbar()">
        <span class="adm-brand__mark">
          <img src="content/images/logo-adm.png" alt="Aeroports du Mali" class="adm-brand__logo" />
        </span>
        <span class="adm-brand__text">
          <strong>ADM manage</strong>
          <small>{{ version }}</small>
        </span>
      </a>
      <button type="button" class="adm-mobile-close" (click)="collapseNavbar()" [attr.aria-label]="'global.navbar.closeMenu' | translate">
        <fa-icon icon="times" />
      </button>
    </div>

    <nav class="adm-sidebar__nav" [attr.aria-label]="'global.navbar.mainNavigation' | translate">
      @for (item of menuItemsAffiches(); track item.labelKey) {
        <a
          class="adm-nav__link"
          [routerLink]="item.route"
          [queryParams]="item.queryParams"
          routerLinkActive="adm-nav__link--active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          (click)="onNavLinkClick(item, $event)"
        >
          <fa-icon [icon]="item.icon" />
          <span [jhiTranslate]="item.labelKey"></span>
        </a>
      }
    </nav>

    <div class="adm-sidebar__footer">
      <span class="adm-sidebar__footer-label" jhiTranslate="global.navbar.connectedAs">Connecté en tant que</span>
      <strong>{{ displayName() }}</strong>
      <small [jhiTranslate]="roleLabel()"></small>
    </div>
  </aside>

  <div class="adm-sidebar-backdrop" [class.adm-sidebar-backdrop--visible]="!isNavbarCollapsed()" (click)="collapseNavbar()"></div>

  <header class="adm-topbar">
    <button type="button" class="adm-mobile-toggle" (click)="toggleNavbar()" [attr.aria-label]="'global.navbar.openMenu' | translate">
      <fa-icon icon="bars" />
    </button>

    <div class="adm-topbar-context">
      <span jhiTranslate="global.navbar.currentModule">Module actif</span>
      <strong [jhiTranslate]="activeSectionLabelKey()"></strong>
    </div>

    <div class="adm-topbar__actions">
      <div ngbDropdown class="adm-language" display="dynamic" container="body">
        <button type="button" class="adm-language__trigger" ngbDropdownToggle [attr.aria-label]="'global.menu.language' | translate">
          <fa-icon icon="flag" />
          <span>{{ currentLanguage() | findLanguageFromKey }}</span>
        </button>

        <div class="dropdown-menu dropdown-menu-end adm-language__menu" ngbDropdownMenu>
          @for (language of languages; track language) {
            <button
              type="button"
              class="dropdown-item adm-language__item"
              [class.active]="language === currentLanguage()"
              (click)="changeLanguage(language)"
            >
              <span>{{ language | findLanguageFromKey }}</span>
              @if (language === currentLanguage()) {
                <fa-icon icon="check" [fixedWidth]="true" />
              }
            </button>
          }
        </div>
      </div>

      <div class="adm-topbar-status" aria-live="polite">
        <span class="adm-topbar-status__dot"></span>
        <span jhiTranslate="global.navbar.sessionActive">Session active</span>
      </div>

      <div ngbDropdown class="adm-account" display="dynamic" container="body">
        <button
          type="button"
          class="adm-account__trigger"
          ngbDropdownToggle
          data-cy="accountMenu"
          [attr.aria-label]="'global.menu.account.main' | translate"
        >
          <span class="adm-account__avatar">{{ initials() }}</span>
          <span class="adm-account__meta">
            <strong>{{ displayName() }}</strong>
            <small [jhiTranslate]="roleLabel()"></small>
          </span>
        </button>

        <div class="dropdown-menu dropdown-menu-end adm-account__menu" ngbDropdownMenu>
          <a class="dropdown-item" routerLink="/account/settings" (click)="collapseNavbar()" data-cy="settings">
            <fa-icon icon="wrench" [fixedWidth]="true" />
            <span jhiTranslate="global.menu.account.settings">Mon profil</span>
          </a>
          <a class="dropdown-item" routerLink="/account/password" (click)="collapseNavbar()" data-cy="passwordItem">
            <fa-icon icon="lock" [fixedWidth]="true" />
            <span jhiTranslate="global.menu.account.password">Mot de passe</span>
          </a>
          <button type="button" class="dropdown-item" (click)="logout()" id="logout" data-cy="logout">
            <fa-icon icon="sign-out-alt" [fixedWidth]="true" />
            <span jhiTranslate="global.menu.account.logout">Deconnexion</span>
          </button>
        </div>
      </div>
    </div>
  </header>
</div>
